name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Validate and publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Verify dist/ is up to date
        run: |
          npm run build
          if [ -n "$(git diff --name-only dist/)" ]; then
            echo "::error::dist/ is out of date for this tag. Run 'npm run release -- ${TAG_NAME}' instead."
            git diff --stat dist/
            exit 1
          fi
        env:
          TAG_NAME: ${{ github.ref_name }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "${TAG_NAME}" \
            --title "${TAG_NAME}" \
            --generate-notes
